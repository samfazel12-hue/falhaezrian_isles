name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout player-safe vault
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Clone Quartz
        run: git clone --branch v4 https://github.com/jackyzha0/quartz.git _quartz

      - name: Copy Quartz config
        shell: bash
        run: |
          cp quartz.config.ts _quartz/quartz.config.ts
          cp quartz.layout.ts _quartz/quartz.layout.ts

      - name: Install Quartz dependencies
        working-directory: _quartz
        run: npm install

      - name: Build site
        working-directory: _quartz
        run: npx quartz build -d .. -o ../public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
